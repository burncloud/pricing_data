name: Validate pricing.json

on:
  pull_request:
    paths:
      - 'pricing.json'
  push:
    branches: [main]
    paths:
      - 'pricing.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate JSON syntax
        run: jq empty pricing.json

      - name: Check required top-level fields
        run: |
          jq -e '.version and .updated_at and .source and .models' pricing.json > /dev/null
          echo "Required fields present"

      - name: Check all prices are non-negative
        run: |
          # v7.0: model IS the currency map — .value | to_entries[] gives currency entries
          # Check text prices (input + output)
          if jq -e '
            [.models | to_entries[] | .value | to_entries[] | .value |
            (.text // {}) |
            select((.input != null and .input < 0) or
                   (.output != null and .output < 0))] | length > 0
          ' pricing.json | grep -q true; then
            echo "❌ Negative text prices found"
            exit 1
          fi
          # Check audio output prices
          if jq -e '
            [.models | to_entries[] | .value | to_entries[] | .value |
            (.audio // {}) |
            select(.output != null and .output < 0)] | length > 0
          ' pricing.json | grep -q true; then
            echo "❌ Negative audio prices found"
            exit 1
          fi
          # Check image output prices
          if jq -e '
            [.models | to_entries[] | .value | to_entries[] | .value |
            (.image // {}) |
            select(.output != null and .output < 0)] | length > 0
          ' pricing.json | grep -q true; then
            echo "❌ Negative image prices found"
            exit 1
          fi
          echo "✅ All prices are non-negative"

      - name: Check model count
        run: |
          COUNT=$(jq '.models | length' pricing.json)
          echo "Model count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "❌ pricing.json must contain at least one model"
            exit 1
          fi
