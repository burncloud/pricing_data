name: Validate pricing.json

on:
  pull_request:
    paths:
      - 'pricing.json'
  push:
    branches: [main]
    paths:
      - 'pricing.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate JSON syntax
        run: jq empty pricing.json

      - name: Check required top-level fields
        run: |
          jq -e '.version and .updated_at and .source and .models' pricing.json > /dev/null
          echo "Required fields present"

      - name: Check all prices are non-negative
        run: |
          # v8.0: check in/out/sec/per across all modalities
          # Check token prices (in/out) across text, audio, image, video
          for mod in text audio image video; do
            if jq -e --arg m "$mod" '
              [.models | to_entries[] | .value | to_entries[] | .value |
              (.[$m] // {}) |
              select((.["in"] != null and .["in"] < 0) or
                     (.out != null and .out < 0))] | length > 0
            ' pricing.json | grep -q true; then
              echo "❌ Negative $mod token prices found"
              exit 1
            fi
          done
          # Check per-second prices (video.sec)
          if jq -e '
            [.models | to_entries[] | .value | to_entries[] | .value |
            (.video // {}) |
            select(.sec != null and .sec < 0)] | length > 0
          ' pricing.json | grep -q true; then
            echo "❌ Negative video per-second prices found"
            exit 1
          fi
          # Check per-item prices (image.per, music.per)
          for mod in image music; do
            if jq -e --arg m "$mod" '
              [.models | to_entries[] | .value | to_entries[] | .value |
              (.[$m] // {}) |
              select(.per != null and .per < 0)] | length > 0
            ' pricing.json | grep -q true; then
              echo "❌ Negative $mod per-item prices found"
              exit 1
            fi
          done
          echo "✅ All prices are non-negative"

      - name: Check model count
        run: |
          COUNT=$(jq '.models | length' pricing.json)
          echo "Model count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then
            echo "❌ pricing.json must contain at least one model"
            exit 1
          fi
