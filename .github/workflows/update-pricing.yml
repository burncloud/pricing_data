name: Update Pricing Data

on:
  schedule:
    # Run at 00:00 UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Create sources directory
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p sources/$DATE
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Fetch from OpenRouter
        if: ${{ secrets.OPENROUTER_API_KEY != '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -c "
          import json
          import requests
          import os
          from datetime import datetime, timezone

          api_key = os.environ.get('OPENROUTER_API_KEY')
          if not api_key:
              print('No API key, skipping')
              exit(0)

          headers = {
              'Authorization': f'Bearer {api_key}',
              'Accept': 'application/json'
          }

          resp = requests.get('https://openrouter.ai/api/v1/models', headers=headers, timeout=30)
          resp.raise_for_status()
          data = resp.json()

          models = {}
          for m in data.get('data', []):
              model_id = m.get('id', '')
              if '/' in model_id:
                  model_id = model_id.split('/', 1)[1]

              pricing = m.get('pricing', {})
              prompt = pricing.get('prompt')
              completion = pricing.get('completion')

              if prompt and completion:
                  models[model_id] = {
                      'pricing': {
                          'USD': {
                              'input_price': float(prompt) * 1000000,
                              'output_price': float(completion) * 1000000,
                              'unit': 'per_million_tokens',
                              'source': 'openrouter'
                          }
                      },
                      'metadata': {
                          'provider': m.get('id', '').split('/')[0] if '/' in m.get('id', '') else 'unknown',
                          'context_window': m.get('context_length')
                      }
                  }

          result = {
              'source': 'openrouter',
              'fetched_at': datetime.now(timezone.utc).isoformat(),
              'status': 'success',
              'models_count': len(models),
              'models': models
          }

          with open(f'sources/{os.environ[\"DATE\"]}/openrouter.json', 'w') as f:
              json.dump(result, f, indent=2)

          print(f'Fetched {len(models)} models from OpenRouter')
          "
        continue-on-error: true

      - name: Merge pricing data
        id: merge
        run: |
          python -c "
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          date = os.environ.get('DATE', datetime.now().strftime('%Y-%m-%d'))
          sources_dir = Path(f'sources/{date}')

          all_models = {}

          if sources_dir.exists():
              for src_file in sources_dir.glob('*.json'):
                  with open(src_file) as f:
                      data = json.load(f)
                  if data.get('status') == 'success' and data.get('models'):
                      all_models.update(data['models'])
                      print(f'Loaded {len(data[\"models\"])} models from {src_file.name}')

          # If no new data, keep existing pricing.json
          if not all_models:
              if Path('pricing.json').exists():
                  print('No new data, keeping existing pricing.json')
                  exit(0)
              else:
                  print('No data available')
                  exit(1)

          result = {
              'schema_version': '1.0',
              'updated_at': datetime.now(timezone.utc).isoformat(),
              'source': 'burncloud-official',
              'models': all_models
          }

          with open('pricing.json', 'w') as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          print(f'Merged {len(all_models)} models to pricing.json')
          "

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "Some tests failed"
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m "chore: update pricing data - $(date +%Y-%m-%d)"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Pricing Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **Changes committed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes detected**" >> $GITHUB_STEP_SUMMARY
          fi
