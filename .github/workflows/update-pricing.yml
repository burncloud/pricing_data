name: Update Pricing Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch pricing data
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          python -m scripts.fetch_all "$DATE"

      - name: Merge pricing data
        run: |
          DATE=$(date +%Y-%m-%d)
          python -m scripts.merge "$DATE"

      - name: Check for changes
        id: changes
        run: |
          # Compare .models content only — updated_at changes every run and is noise.
          # Two runs with identical prices must NOT produce a commit.
          PREV=$(git show HEAD:pricing.json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('models',{}), sort_keys=True))" 2>/dev/null || echo "{}")
          CURR=$(python3 -c "import sys,json; d=json.load(open('pricing.json')); print(json.dumps(d.get('models',{}), sort_keys=True))")
          if [ "$PREV" = "$CURR" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ **No price changes detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### Price changes detected" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --stat pricing.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pricing.json
          git commit -m "chore: update pricing data - $(date +%Y-%m-%d)"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Pricing Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **Changes committed and pushed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes detected**" >> $GITHUB_STEP_SUMMARY
          fi
