name: Update Pricing Data

on:
  schedule:
    # Run at 00:00 UTC daily
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      skip_history:
        description: 'Skip creating history snapshot'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Install Playwright browsers (optional)
        run: |
          pip install playwright && playwright install chromium || echo "Playwright not available"
        continue-on-error: true

      - name: Fetch pricing data from OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m scripts.fetch.openrouter
        continue-on-error: true

      - name: Merge pricing data
        id: merge
        run: |
          DATE=$(date +%Y-%m-%d)
          python -m scripts.merge $DATE

      - name: Create history snapshot
        if: github.event.inputs.skip_history != 'true'
        run: |
          python -m scripts.history

      - name: Compare with previous
        id: compare
        run: |
          python -m scripts.compare
        continue-on-error: true

      - name: Generate RSS feeds
        run: |
          python -m scripts.rss
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "Some tests failed"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet pricing.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "change_summary=$(git diff --stat pricing.json | tail -1)" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update pricing data

            Automated pricing update from scheduled job.

            Changes: ${{ steps.changes.outputs.change_summary }}
          title: "chore: daily pricing update"
          body: |
            ## Pricing Data Update

            This is an automated daily update of pricing data.

            ### Files Updated
            - `pricing.json` - Main pricing data
            - `comparison.json` - Price comparison
            - `daily-summary.xml` - RSS feed

            ---
            *This PR was created automatically.*
          branch: automated/pricing-update
          branch-suffix: timestamp
          labels: |
            automated
            pricing

      - name: Commit changes directly
        if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pricing.json comparison.json daily-summary.xml history/
          git diff --staged --quiet || git commit -m "chore: update pricing data"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pricing-data-${{ github.run_number }}
          path: |
            pricing.json
            comparison.json
            daily-summary.xml
            history/
            sources/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Pricing Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ **Changes detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes detected**" >> $GITHUB_STEP_SUMMARY
          fi

  # Cleanup job runs weekly
  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Clean old history snapshots
        run: |
          python -c "
          from scripts.history import HistoryManager
          manager = HistoryManager()
          removed = manager.cleanup_old_snapshots()
          print(f'Removed {removed} old snapshots')
          "

      - name: Commit cleanup
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: cleanup old history snapshots"
          git push
